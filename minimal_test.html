<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Isolation Test</title>
</head>
<body style="font-family: sans-serif; max-width: 500px; margin: 60px auto; padding: 0 20px;">
  <h1>Submission Isolation Test</h1>
  <p>Click the button, then check DevTools → Network tab for the <code>formResponse</code> request's status code.</p>

  <!--
    STEP 1: Replace these two placeholder values with what
    createMinimalTestForm() logged for you.
  -->
  <script>
    const FORM_ACTION = "https://docs.google.com/forms/d/e/1FAIpQLScfn6EB2VxhqMKmTCvJBhQi1FYujEbivTPsN-cdJWNxDCCHpQ/formResponse";
    const ENTRY_ID = "entry.931277015";
  </script>

  <button id="btn" style="font-size: 16px; padding: 12px 24px; cursor: pointer;">Send test submission</button>
  <p id="status" style="margin-top: 20px; font-family: monospace;"></p>

  <script>
    document.getElementById('btn').addEventListener('click', async () => {
      const statusEl = document.getElementById('status');
      statusEl.textContent = 'Sending...';

      const body = new URLSearchParams();
      body.append(ENTRY_ID, 'isolation test value ' + new Date().toISOString());

      try {
        await fetch(FORM_ACTION, { method: 'POST', mode: 'no-cors', body });
        statusEl.textContent = 'Fetch completed without throwing (no-cors always looks like this — check the Network tab for the real status code, then check the response sheet for a new row).';
      } catch (err) {
        statusEl.textContent = 'Fetch threw an error: ' + err.message;
      }
    });
  </script>
</body>
</html>
